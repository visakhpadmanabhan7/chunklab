name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
      - name: Install deps (pure-logic test subset)
        run: uv pip install --system pydantic pydantic-settings pytest pytest-asyncio
      - name: Lint
        run: |
          uv pip install --system ruff
          ruff check backend/app backend/tests
      - name: Unit tests (no external services)
        run: |
          python -m pytest backend/tests/test_config.py backend/tests/test_chunking.py \
            backend/tests/test_metrics.py backend/tests/test_pricing_jsonutil.py -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - run: npm run build
